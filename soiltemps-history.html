<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4" Soil Temps — Acre Insights</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 36px;
    }
    .chart-wrap {
      width: 100%;
      max-width: 900px;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 32px 28px 24px;
    }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .stat {
      flex: 1;
      min-width: 120px;
      background: #111827;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 14px 18px;
    }
    .stat-label {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    .stat-value span {
      font-size: 0.75rem;
      font-weight: 400;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>4&quot; Soil Temperatures</h1>
  <div class="subtitle">Acre Insights — Daily readings since monitoring began</div>

  <div class="chart-wrap">
    <canvas id="chart" height="320"></canvas>

    <div class="stats-row" id="stats"></div>
  </div>

  <script>
    const data = [
      { date: "Apr 5",  avg: 48.4, high: 60.6, low: 38.5 },
      { date: "Apr 6",  avg: 48.0, high: 54.5, low: 42.8 },
      { date: "Apr 7",  avg: 48.0, high: 57.2, low: 41.2 },
      { date: "Apr 8",  avg: 53.2, high: 60.4, low: 48.2 },
      { date: "Apr 9",  avg: 52.7, high: 61.9, low: 46.4 },
      { date: "Apr 10", avg: 49.2, high: 54.3, low: 44.1 },
      { date: "Apr 11", avg: 54.6, high: 62.8, low: 49.5 },
      { date: "Apr 12", avg: 62.1, high: 71.2, low: 55.4 },
      { date: "Apr 13", avg: 62.8, high: 72.3, low: 55.4 },
      { date: "Apr 14", avg: 61.3, high: 67.8, low: 56.3 },
      { date: "Apr 15", avg: 58.7, high: 64.8, low: 55.2 },
      { date: "Apr 16", avg: 59.3, high: 69.6, low: 49.3 },
      { date: "Apr 17", avg: 56.4, high: 61.2, low: 49.5 },
      { date: "Apr 18", avg: 50.8, high: 58.1, low: 43.5 },
      { date: "Apr 19", avg: 54.0, high: 66.7, low: 42.4 },
      { date: "Apr 20", avg: 58.6, high: 69.6, low: 47.1 },
      { date: "Apr 22", avg: 65.0, high: 71.6, low: 59.0 },
      { date: "Apr 23", avg: 64.9, high: 70.9, low: 60.1 },
      { date: "Apr 24", avg: 60.3, high: 69.3, low: 53.1 },
      { date: "Apr 25", avg: 54.2, high: 59.7, low: 48.6 },
      { date: "Apr 26", avg: 49.4, high: 52.5, low: 46.4 },
      { date: "Apr 27", avg: 51.3, high: 54.5, low: 47.8 },
      { date: "Apr 28", avg: 46.8, high: 49.1, low: 44.1 },
      { date: "Apr 29", avg: 50.0, high: 61.5, low: 40.1 },
    ];

    const labels = data.map(d => d.date);
    const avgs  = data.map(d => d.avg);
    const highs = data.map(d => d.high);
    const lows  = data.map(d => d.low);

    const ctx = document.getElementById('chart').getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Daily Avg',
            data: avgs,
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56,189,248,0.10)',
            borderWidth: 2.5,
            pointRadius: 4,
            pointHoverRadius: 7,
            pointBackgroundColor: '#38bdf8',
            tension: 0.3,
            fill: false,
          },
        ],
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            borderWidth: 1,
            titleColor: '#f1f5f9',
            bodyColor: '#94a3b8',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}°F`,
            },
          },
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: { color: '#64748b', font: { size: 12 } },
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.06)' },
            ticks: {
              color: '#64748b',
              font: { size: 12 },
              callback: v => v + '°',
            },
            suggestedMin: 30,
            suggestedMax: 80,
            title: {
              display: true,
              text: 'Temperature (°F)',
              color: '#475569',
              font: { size: 12 },
            },
          },
        },
      },
    });

    // Stats
    const allAvgs = avgs;
    const overallAvg = (allAvgs.reduce((a,b) => a+b, 0) / allAvgs.length).toFixed(1);
    const peakHigh = Math.max(...highs).toFixed(1);
    const peakHighDate = data[highs.indexOf(Math.max(...highs))].date;
    const recordLow = Math.min(...lows).toFixed(1);
    const recordLowDate = data[lows.indexOf(Math.min(...lows))].date;
    const latestAvg = avgs[avgs.length - 1].toFixed(1);
    const latestDate = labels[labels.length - 1];

    const stats = [
      { label: 'Latest Avg', value: latestAvg + '°', sub: latestDate },
      { label: 'Overall Avg', value: overallAvg + '°', sub: 'since Apr 5' },
      { label: 'Record High', value: peakHigh + '°', sub: peakHighDate },
      { label: 'Record Low', value: recordLow + '°', sub: recordLowDate },
      { label: 'Days Tracked', value: data.length, sub: 'Apr 5 – Apr 29' },
    ];

    const statsEl = document.getElementById('stats');
    stats.forEach(s => {
      statsEl.innerHTML += `
        <div class="stat">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value">${s.value} <span>${s.sub}</span></div>
        </div>`;
    });
  </script>
</body>
</html>
