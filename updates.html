<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Notes — Acre Insights</title>
  <meta name="description" content="The full version of the notes behind your seasonal Acre Insights texts." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#FDFCFA;
      --ink:#1B1E18;
      --body:#33362D;
      --muted:#5B5F52;
      --green:#2F5D34;
      --line:#E3E0D5;
      --sans:'Libre Franklin',ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{
      background:var(--paper);
      color:var(--body);
      font-family:var(--sans);
      font-size:18px;
      line-height:1.62;
    }

    .wrap{
      max-width:680px;
      margin:0 auto;
      padding:clamp(34px,6vw,72px) clamp(20px,5vw,36px) 96px;
    }

    .masthead{
      border-bottom:1px solid var(--line);
      padding-bottom:26px;
      margin-bottom:8px;
    }
    .eyebrow{
      font-weight:600;
      font-size:.7rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:16px;
    }
    .masthead h1{
      font-weight:700;
      font-size:clamp(2rem,5.5vw,2.7rem);
      line-height:1.1;
      letter-spacing:-.018em;
      color:var(--ink);
    }
    .masthead .sub{
      font-size:1.05rem;
      color:var(--muted);
      margin-top:12px;
      max-width:46ch;
    }

    .note{
      padding:34px 0;
      border-bottom:1px solid var(--line);
      scroll-margin-top:20px;
    }
    .note.is-target .note-title{ color:var(--green); }

    .note-date{
      font-weight:600;
      font-size:.72rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:10px;
    }
    .note-title{
      font-weight:700;
      font-size:clamp(1.35rem,3.2vw,1.7rem);
      line-height:1.22;
      letter-spacing:-.012em;
      color:var(--ink);
      transition:color .25s ease;
    }
    .note-title a{ color:inherit; text-decoration:none; }
    .note-title a:hover{ color:var(--green); }

    .note-brief{
      font-size:1.06rem;
      color:var(--body);
      margin-top:12px;
      max-width:54ch;
    }

    .note-body p{ margin-top:14px; color:var(--body); }
    .note-body p:first-child{ margin-top:14px; }

    .note-foot{
      display:flex;
      align-items:center;
      gap:22px;
      margin-top:18px;
    }
    .note-more{
      font-weight:600;
      font-size:.98rem;
      color:var(--green);
      text-decoration:none;
      border-bottom:1px solid rgba(47,93,52,.35);
      padding-bottom:1px;
    }
    .note-more:hover{ border-bottom-color:var(--green); }
    .note-copy{
      background:none;
      border:none;
      padding:0;
      font-family:var(--sans);
      font-size:.86rem;
      font-weight:500;
      color:var(--muted);
      cursor:pointer;
      letter-spacing:.01em;
    }
    .note-copy:hover{ color:var(--green); }
    .note-copy.copied{ color:var(--green); }

    .feed-state{
      padding:48px 0;
      font-size:.98rem;
      color:var(--muted);
    }
    .feed-state.error{ color:#9A3B2E; }

    .foot{
      margin-top:40px;
      font-size:.74rem;
      letter-spacing:.03em;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="masthead">
      <p class="eyebrow">Acre Insights &nbsp;/&nbsp; Field Notes</p>
      <h1>Field Notes</h1>
      <p class="sub">The full version of the notes behind your seasonal texts. Newest first.</p>
    </div>

    <div id="feed">
      <div class="feed-state">Loading notes…</div>
    </div>

    <p class="foot">Acre Insights &nbsp;/&nbsp; Precision soil moisture monitoring &nbsp;/&nbsp; South-Central Nebraska</p>
  </main>

<script>
function formatDate(ymd) {
  const [y, m, d] = ymd.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function linkFor(id) {
  const base = location.origin + location.pathname.replace(/\.html$/, '');
  return base + '#' + id;
}

function absUrl(url) {
  if (/^https?:\/\//.test(url)) return url;
  return location.origin + url;
}

function paragraphs(body) {
  if (Array.isArray(body)) return body;
  if (typeof body === 'string') return body.split(/\n{2,}/);
  return [];
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function renderUpdate(u) {
  const note = document.createElement('article');
  note.className = 'note';
  note.id = u.id;

  const titleInner = u.url
    ? `<a href="${escapeHtml(u.url)}">${escapeHtml(u.title)}</a>`
    : escapeHtml(u.title);

  const middle = u.url
    ? (u.brief ? `<p class="note-brief">${escapeHtml(u.brief)}</p>` : '')
    : `<div class="note-body">${paragraphs(u.body).map(p => `<p>${escapeHtml(p)}</p>`).join('')}</div>`;

  const more = u.url
    ? `<a class="note-more" href="${escapeHtml(u.url)}">Read the full note →</a>`
    : '';

  note.innerHTML = `
    <div class="note-date">${escapeHtml(formatDate(u.date))}</div>
    <h2 class="note-title">${titleInner}</h2>
    ${middle}
    <div class="note-foot">
      ${more}
      <button class="note-copy" type="button">Copy link</button>
    </div>
  `;

  const btn = note.querySelector('.note-copy');
  btn.addEventListener('click', async () => {
    const link = u.url ? absUrl(u.url) : linkFor(u.id);
    try {
      await navigator.clipboard.writeText(link);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = link; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 1600);
  });

  return note;
}

function highlightTarget() {
  const id = decodeURIComponent(location.hash.replace(/^#/, ''));
  if (!id) return;
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('is-target');
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function load() {
  const feed = document.getElementById('feed');
  try {
    const res = await fetch('/updates.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const updates = (data.updates || [])
      .slice()
      .sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));

    feed.innerHTML = '';
    if (!updates.length) {
      feed.innerHTML = '<div class="feed-state">No notes posted yet.</div>';
      return;
    }
    updates.forEach(u => feed.appendChild(renderUpdate(u)));
    highlightTarget();
  } catch (e) {
    feed.innerHTML = `<div class="feed-state error">Couldn't load notes: ${escapeHtml(e.message)}</div>`;
  }
}

window.addEventListener('hashchange', highlightTarget);
load();
</script>
</body>
</html>
