<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Updates — Acre Insights</title>
  <meta name="description" content="Expanded notes from your seasonal Acre Insights text messages." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f0;
      color: #1a2e1a;
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      background: #2d5016;
      color: #f0ede4;
      padding: 18px 20px 16px;
    }
    header .eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 4px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    header .sub {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 3px;
    }

    .feed { padding: 14px 14px 48px; display: flex; flex-direction: column; gap: 16px; }

    .update-card {
      background: #fff;
      border: 1px solid #dde5d4;
      border-radius: 12px;
      overflow: hidden;
      scroll-margin-top: 14px;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .update-card.is-target {
      border-color: #2d5016;
      box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.15);
    }

    .update-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 0;
    }
    .update-date {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #2d5016;
      opacity: 0.85;
    }

    .copy-btn {
      flex-shrink: 0;
      background: #eef2e8;
      color: #2d5016;
      border: 1px solid #d3e0c4;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #e3ebd8; }
    .copy-btn.copied { background: #2d5016; color: #fff; border-color: #2d5016; }

    .update-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 6px 16px 0;
    }

    .update-brief {
      padding: 8px 16px 0;
      font-size: 14px;
      font-style: italic;
      color: #56684f;
    }

    .update-body { padding: 12px 16px 18px; }
    .update-body p { font-size: 15px; margin-top: 12px; }
    .update-body p:first-child { margin-top: 0; }

    .update-readmore { padding: 12px 16px 18px; }
    .update-readmore a {
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      color: #2d5016;
      text-decoration: none;
      border-bottom: 1px solid rgba(45, 80, 22, 0.4);
    }
    .update-readmore a:hover { border-bottom-color: #2d5016; }

    .feed-empty, .feed-loading, .feed-error {
      padding: 28px 16px;
      text-align: center;
      font-size: 13px;
      color: #999;
    }
    .feed-error { color: #c0392b; }

    footer {
      text-align: center;
      padding: 0 16px 32px;
      font-size: 11px;
      color: #9aa890;
      letter-spacing: 0.04em;
    }

    @media (min-width: 600px) {
      .feed { max-width: 640px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Acre Insights</div>
  <h1>Field Updates</h1>
  <div class="sub">The full version of the notes behind your seasonal texts. Newest first.</div>
</header>

<div class="feed" id="feed">
  <div class="feed-loading">Loading updates…</div>
</div>

<footer>Acre Insights · seasonal field notes</footer>

<script>
function formatDate(ymd) {
  // ymd is "YYYY-MM-DD"; parse as local date to avoid timezone shifting the day
  const [y, m, d] = ymd.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function linkFor(id) {
  const base = location.origin + location.pathname.replace(/\.html$/, '');
  return base + '#' + id;
}

function absUrl(url) {
  if (/^https?:\/\//.test(url)) return url;
  return location.origin + url;
}

function paragraphs(body) {
  if (Array.isArray(body)) return body;
  if (typeof body === 'string') return body.split(/\n{2,}/);
  return [];
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function renderUpdate(u) {
  const card = document.createElement('article');
  card.className = 'update-card';
  card.id = u.id;

  const tail = u.url
    ? `<div class="update-readmore"><a href="${escapeHtml(u.url)}">Read the full note →</a></div>`
    : `<div class="update-body">${paragraphs(u.body).map(p => `<p>${escapeHtml(p)}</p>`).join('')}</div>`;

  card.innerHTML = `
    <div class="update-head">
      <div class="update-date">${escapeHtml(formatDate(u.date))}</div>
      <button class="copy-btn" type="button">Copy link</button>
    </div>
    <div class="update-title">${escapeHtml(u.title)}</div>
    ${u.brief ? `<div class="update-brief">${escapeHtml(u.brief)}</div>` : ''}
    ${tail}
  `;

  const btn = card.querySelector('.copy-btn');
  btn.addEventListener('click', async () => {
    const link = u.url ? absUrl(u.url) : linkFor(u.id);
    try {
      await navigator.clipboard.writeText(link);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = link; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 1600);
  });

  return card;
}

function highlightTarget() {
  const id = decodeURIComponent(location.hash.replace(/^#/, ''));
  if (!id) return;
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('is-target');
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function load() {
  const feed = document.getElementById('feed');
  try {
    const res = await fetch('/updates.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const updates = (data.updates || [])
      .slice()
      .sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));

    feed.innerHTML = '';
    if (!updates.length) {
      feed.innerHTML = '<div class="feed-empty">No updates posted yet.</div>';
      return;
    }
    updates.forEach(u => feed.appendChild(renderUpdate(u)));
    highlightTarget();
  } catch (e) {
    feed.innerHTML = `<div class="feed-error">Couldn't load updates: ${escapeHtml(e.message)}</div>`;
  }
}

window.addEventListener('hashchange', highlightTarget);
load();
</script>
</body>
</html>
